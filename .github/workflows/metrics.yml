name: Metrics
on:
  push: { branches: ['master', 'main'] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics_contributors.svg
          repo: slack-upload-file
          template: repository
          base: ''
          output_action: gist
          committer_gist: ${{ secrets.METRICS_GIST }}
          plugin_contributors: yes
          plugin_contributors_sections: contributors,categories
          plugin_contributors_categories: |
            {
              "📚 Documentation":["**/*.md"],
              "💻 Code":["**/*.ts"]
            }

      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics_licenses.svg
          repo: slack-upload-file
          template: repository
          base: ''
          output_action: gist
          committer_gist: ${{ secrets.METRICS_GIST }}
          plugin_licenses: yes
          plugin_licenses_setup: npm ci
          plugin_licenses_ratio: yes
          plugin_licenses_legal: yes
