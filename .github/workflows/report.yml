name: Report

on:
  workflow_run:
    workflows: ['CI-Master', 'CI-PR']
    types:
      - completed
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: write
      contents: read
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: sleep 10s
        name: wait for API&DB synchronized
      - name: Download artifact
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: result
      - name: Transform report file
        uses: MeilCli/common-lint-reporter/transformer/eslint@de8817249da66ae9e06c561e25352c47c0df3424 # v2.0.4
        with:
          report_files: |
            eslint_report.json
      - name: Report lint result
        uses: MeilCli/common-lint-reporter@de8817249da66ae9e06c561e25352c47c0df3424 # v2.0.4
        with:
          report_type: 'check_run'
          report_name: 'Lint Report'
