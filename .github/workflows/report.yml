name: Report

on:
  workflow_run:
    workflows: ['CI-Master', 'CI-PR']
    types:
      - completed
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: write
      contents: read
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: sleep 10s
        name: wait for API&DB synchronized
      - name: Download artifact
        uses: dawidd6/action-download-artifact@8a338493df3d275e4a7a63bcff3b8fe97e51a927 # v19
        with:
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: result
      - name: Transform report file
        uses: MeilCli/common-lint-reporter/transformer/eslint@863e4503ea44483a30924802c06469944e48bcce # v2.0.3
        with:
          report_files: |
            eslint_report.json
      - name: Report lint result
        uses: MeilCli/common-lint-reporter@863e4503ea44483a30924802c06469944e48bcce # v2.0.3
        with:
          report_type: 'check_run'
          report_name: 'Lint Report'
